<div class="serija">
  <div>
    <img alt="slika serije" [src]="slikaUrl | pipaTmdbSlika" />
  </div>

  <div class="info">
    <h2>{{ naslov }}</h2>
    <p *ngIf="opis == ''">Serija nema opisa</p>
    <p *ngIf="opis != ''">{{ opis }}</p>
    <button class="ocrtani margin-top-10" (click)="prikaziDetalje.emit(id)">Detalji</button>
  </div>
</div>
