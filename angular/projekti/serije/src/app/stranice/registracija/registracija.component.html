<div class="margin-all-50">
  <h1>Registracija</h1>

  <form (ngSubmit)="registrirajKorisnika()" class="margin-top-20">
    <div>
      <label>Korisničko ime</label>
      <input name="korisnicko_ime" type="text" [(ngModel)]="korisnicko_ime" />
    </div>

    <div class="margin-top-10">
      <label>Email</label>
      <input name="email" type="text" [(ngModel)]="email" />
    </div>

    <div class="margin-top-10">
      <label>Lozinka</label>
      <input name="lozinka" type="text" [(ngModel)]="lozinka" />
    </div>

    <div class="margin-top-10">
      <label>Ime</label>
      <input name="ime" type="text" [(ngModel)]="ime" />
    </div>

    <div class="margin-top-10">
      <label>Prezime</label>
      <input name="prezime" type="text" [(ngModel)]="prezime" />
    </div>

    <div class="margin-top-10">
      <label>Spol</label>

      <div>
        <input name="spol" type="radio" [(ngModel)]="spol" value="M" />
        <label>Muško</label>
      </div>

      <div>
        <input name="spol" type="radio" [(ngModel)]="spol" value="Z" />
        <label>Žensko</label>
      </div>
    </div>

    <div class="margin-top-10">
      <label>Datum rođenja</label>
      <input name="datum_rodenja" type="text" [(ngModel)]="datum_rodenja" />
    </div>

    <div class="margin-top-10">
      <label>Najdraža životinja</label>
      <input name="najdraza_zivotinja" type="text" [(ngModel)]="najdraza_zivotinja" />
    </div>

    <div class="margin-top-10">
      <label>Tip korisnika</label>

      <div>
        <input name="tip_korisnika" type="radio" [(ngModel)]="tip_korisnika" value="obican" />
        <label>Običan</label>
      </div>

      <div>
        <input name="tip_korisnika" type="radio" [(ngModel)]="tip_korisnika" value="admin" />
        <label>Admin</label>
      </div>
    </div>

    <div class="margin-top-20">
      <button type="submit" class="puni">Registriraj korisnika</button>
      <button type="button" (click)="ocistiUnos()" class="ocrtani margin-left-20">Odustani</button>
    </div>

    <div class="margin-top-10">
      <app-poruka [poruka]="poruka"></app-poruka>
    </div>
  </form>
</div>
